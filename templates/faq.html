{% extends "base.html" %}

{% block content %}

<section class="page-shell">
<div class="container">
<div class="section-head">
<p class="eyebrow">Support</p>
<h2>Frequently Asked Questions</h2>
</div>

<div class="faq-list">
{% for faq in faqs %}
<article class="faq-item">
<h4>{{ faq.question }}</h4>
<p>{{ faq.answer }}</p>
</article>
{% endfor %}
</div>
</div>
</section>

{% endblock %}
